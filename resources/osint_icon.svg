<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="lensGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#0088cc;stop-opacity:0.25"/>
    </linearGradient>
    <linearGradient id="rimGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#0077b6"/>
    </linearGradient>
  </defs>
  <!-- Lens fill -->
  <circle cx="108" cy="108" r="72" fill="url(#lensGrad)"/>
  <!-- Lens rim -->
  <circle cx="108" cy="108" r="72" fill="none" stroke="url(#rimGrad)" stroke-width="12" stroke-linecap="round"/>
  <!-- Handle -->
  <line x1="162" y1="162" x2="230" y2="230" stroke="url(#rimGrad)" stroke-width="16" stroke-linecap="round"/>
  <!-- Shine -->
  <path d="M72 72 Q85 58 100 65" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
</svg>
