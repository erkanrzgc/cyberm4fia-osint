name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,api,report,socks,whois,photo,dns]"

      - name: Ruff
        run: ruff check main.py core modules utils tests

      - name: Mypy
        run: mypy --ignore-missing-imports core modules utils

      - name: Bandit
        run: bandit -r core modules utils main.py mcp_server.py -q

      - name: Pytest
        run: pytest --cov=core --cov=modules --cov=utils --cov-report=term-missing
